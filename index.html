<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var p = localStorage.getItem('theme-preference')
        var dark = p === 'dark' || (p !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="prerender-head" content="" />
    <link rel="icon" type="image/webp" href="/assets/images/logo/okultis-o-square.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,400..600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

      custom software, digital products, and cloud platforms.

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
